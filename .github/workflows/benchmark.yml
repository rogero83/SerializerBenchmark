name: Build and Benchmark

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore SerializerBenchmark.slnx

    - name: Build
      run: dotnet build SerializerBenchmark.slnx --configuration Release --no-restore

    - name: Run Benchmarks
      run: |
        dotnet run --project SerializerBenchmark.Benchmarks/SerializerBenchmark.Benchmarks.csproj --configuration Release -- --filter * --join
      # BenchmarkDotNet generates results in BenchmarkDotNet.Artifacts/results

    - name: Upload Benchmark Results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: SerializerBenchmark.Benchmarks/BenchmarkDotNet.Artifacts/results/
